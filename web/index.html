<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Generator</title>
<style>
  :root {
    --bg-primary: #0f0f1a;
    --bg-secondary: #1a1a2e;
    --bg-tertiary: #16213e;
    --bg-card: #1e1e36;
    --accent: #00d4ff;
    --accent-dim: rgba(0, 212, 255, 0.15);
    --accent-hover: #00b8e6;
    --text-primary: #e8e8f0;
    --text-secondary: #8888a8;
    --text-muted: #55557a;
    --border: #2a2a4a;
    --danger: #ff4466;
    --success: #00cc88;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.5;
  }

  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 20px 48px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 32px 0 24px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .header p {
    color: var(--text-secondary);
    font-size: 14px;
    margin-top: 4px;
  }

  /* Template Chips */
  .templates {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .chip {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }
  .chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* Prompt Area */
  .prompt-section {
    margin-bottom: 16px;
  }
  .prompt-textarea {
    width: 100%;
    min-height: 100px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 15px;
    padding: 16px;
    resize: vertical;
    transition: border-color 0.2s;
  }
  .prompt-textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .prompt-textarea::placeholder { color: var(--text-muted); }

  /* Reference Image Upload */
  .img2img-section {
    margin-bottom: 16px;
  }
  .img2img-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .img2img-header label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .img2img-header .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--accent-dim);
    color: var(--accent);
  }
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg-secondary);
    position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .drop-zone-text {
    color: var(--text-muted);
    font-size: 13px;
  }
  .drop-zone-text .icon { font-size: 24px; display: block; margin-bottom: 4px; }

  .ref-preview {
    display: none;
    position: relative;
    margin-top: 8px;
  }
  .ref-preview.visible { display: flex; align-items: flex-start; gap: 12px; }
  .ref-preview img {
    max-width: 120px;
    max-height: 120px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    object-fit: cover;
  }
  .ref-preview .ref-info {
    flex: 1;
  }
  .ref-preview .ref-name {
    font-size: 13px;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .strength-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .strength-row label {
    font-size: 12px;
    color: var(--text-secondary);
    min-width: 60px;
  }
  .strength-row input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
  }
  .strength-row .strength-val {
    font-size: 12px;
    color: var(--accent);
    min-width: 32px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .ref-remove {
    background: none;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    line-height: 1;
  }

  /* Settings */
  .settings-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    padding: 8px 0;
    margin-bottom: 8px;
  }
  .settings-toggle:hover { color: var(--text-primary); }
  .settings-toggle .arrow { transition: transform 0.2s; display: inline-block; }
  .settings-toggle .arrow.open { transform: rotate(90deg); }

  .settings-panel {
    display: none;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }
  .settings-panel.open { display: block; }

  .settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }
  .setting-item label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .setting-item input {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 14px;
    padding: 8px 12px;
  }
  .setting-item input:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* Generate Button */
  .generate-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .btn-generate {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), #7c3aed);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-generate:hover { opacity: 0.9; }
  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-generate.loading .spinner { display: inline-block; }

  /* Result */
  .result-section {
    display: none;
  }
  .result-section.visible { display: block; }

  .result-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .result-image-wrap {
    position: relative;
    background: #000;
    display: flex;
    justify-content: center;
    min-height: 200px;
  }
  .result-image-wrap img {
    max-width: 100%;
    height: auto;
    display: block;
  }
  .result-meta {
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
  }
  .result-actions {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    flex-wrap: wrap;
  }
  .btn-action {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .btn-action:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* History Gallery */
  .history-section { margin-top: 32px; }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .history-header h3 {
    font-size: 16px;
    color: var(--text-secondary);
  }
  .btn-clear-history {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
  }
  .btn-clear-history:hover { color: var(--danger); }

  .history-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }
  .history-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: var(--radius-sm);
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .history-item .history-prompt {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 4px 8px;
    background: rgba(0,0,0,0.7);
    font-size: 10px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  /* Error */
  .error-msg {
    background: rgba(255,68,102,0.1);
    border: 1px solid rgba(255,68,102,0.3);
    color: var(--danger);
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .error-msg.visible { display: block; }

  /* Responsive */
  @media (max-width: 600px) {
    .app { padding: 16px 12px 32px; }
    .header h1 { font-size: 22px; }
    .settings-grid { grid-template-columns: 1fr 1fr; }
    .history-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    .result-actions { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>Content Generator</h1>
    <p>Create images for social media, thumbnails, memes & more</p>
  </div>

  <!-- Template Chips -->
  <div class="templates" id="templates"></div>

  <!-- Prompt -->
  <div class="prompt-section">
    <textarea class="prompt-textarea" id="prompt" placeholder="Describe what you want to see... (e.g. &quot;A futuristic cityscape at golden hour, cinematic lighting, 8k&quot;)" rows="3"></textarea>
  </div>

  <!-- Reference Image (img2img) -->
  <div class="img2img-section">
    <div class="img2img-header">
      <label>Reference Image</label>
      <span class="badge">Optional — img2img</span>
    </div>
    <div class="drop-zone" id="dropZone">
      <input type="file" accept="image/*" id="refImageInput">
      <div class="drop-zone-text">
        <span class="icon">📎</span>
        Drop an image here or click to upload
      </div>
    </div>
    <div class="ref-preview" id="refPreview">
      <img id="refThumb" src="" alt="Reference">
      <div class="ref-info">
        <div class="ref-name" id="refName"></div>
        <div class="strength-row">
          <label>Strength</label>
          <input type="range" id="strengthSlider" min="0" max="100" value="70" step="5">
          <span class="strength-val" id="strengthVal">0.70</span>
        </div>
      </div>
      <button class="ref-remove" id="refRemove" title="Remove">✕</button>
    </div>
  </div>

  <!-- Settings -->
  <button class="settings-toggle" id="settingsToggle">
    <span class="arrow" id="settingsArrow">▶</span> Settings
  </button>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-grid">
      <div class="setting-item">
        <label>Width</label>
        <input type="number" id="width" value="1024" min="256" max="2048" step="64">
      </div>
      <div class="setting-item">
        <label>Height</label>
        <input type="number" id="height" value="1024" min="256" max="2048" step="64">
      </div>
      <div class="setting-item">
        <label>Steps</label>
        <input type="number" id="steps" value="30" min="1" max="50">
      </div>
      <div class="setting-item">
        <label>Guidance</label>
        <input type="number" id="guidance" value="4.5" min="1.0" max="20.0" step="0.5">
      </div>
      <div class="setting-item">
        <label>Seed (blank = random)</label>
        <input type="number" id="seed" placeholder="Random">
      </div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Generate -->
  <div class="generate-row">
    <button class="btn-generate" id="generateBtn">
      <span class="spinner" id="spinner"></span>
      <span id="generateText">Generate</span>
    </button>
  </div>

  <!-- Result -->
  <div class="result-section" id="resultSection">
    <div class="result-card">
      <div class="result-image-wrap">
        <img id="resultImage" src="" alt="Generated image">
      </div>
      <div class="result-meta">
        <span id="resultInfo"></span>
        <span id="resultTime"></span>
      </div>
      <div class="result-actions">
        <button class="btn-action" id="btnDownload">⬇ Download</button>
        <button class="btn-action" id="btnRegen">🔄 Regenerate</button>
        <button class="btn-action" id="btnCopyPrompt">📋 Copy Prompt</button>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-header">
      <h3>Recent</h3>
      <button class="btn-clear-history" id="btnClearHistory">Clear all</button>
    </div>
    <div class="history-grid" id="historyGrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = `${location.protocol}//${location.hostname}:9502`;

// Templates
const TEMPLATES = [
  { name: "Instagram Post",    w: 1080, h: 1080, hint: "vibrant, eye-catching, social media aesthetic" },
  { name: "Instagram Story",   w: 1080, h: 1920, hint: "vertical format, bold, engaging story visual" },
  { name: "Twitter/X Post",    w: 1200, h: 672,  hint: "wide format, clean, shareable" },
  { name: "YouTube Thumbnail", w: 1280, h: 720,  hint: "dramatic, high contrast, attention-grabbing" },
  { name: "Meme Template",     w: 1024, h: 1024, hint: "simple, bold, meme-friendly style" },
  { name: "Product Photo",     w: 1024, h: 1024, hint: "clean white background, professional product photography, studio lighting" },
  { name: "Abstract Art",      w: 1024, h: 1024, hint: "artistic, creative, abstract, painterly" },
];

// State
let currentBlob = null;
let lastPrompt = "";
let lastSeed = null;
let refFile = null;
let history = JSON.parse(localStorage.getItem("cg_history") || "[]");

// Elements
const $prompt   = document.getElementById("prompt");
const $width    = document.getElementById("width");
const $height   = document.getElementById("height");
const $steps    = document.getElementById("steps");
const $guidance = document.getElementById("guidance");
const $seed     = document.getElementById("seed");
const $genBtn   = document.getElementById("generateBtn");
const $genText  = document.getElementById("generateText");
const $spinner  = document.getElementById("spinner");
const $result   = document.getElementById("resultSection");
const $img      = document.getElementById("resultImage");
const $info     = document.getElementById("resultInfo");
const $time     = document.getElementById("resultTime");
const $error    = document.getElementById("errorMsg");
const $dropZone = document.getElementById("dropZone");
const $refInput = document.getElementById("refImageInput");
const $refPrev  = document.getElementById("refPreview");
const $refThumb = document.getElementById("refThumb");
const $refName  = document.getElementById("refName");
const $strSlider= document.getElementById("strengthSlider");
const $strVal   = document.getElementById("strengthVal");
const $refRem   = document.getElementById("refRemove");

// Init templates
const $templates = document.getElementById("templates");
TEMPLATES.forEach((t, i) => {
  const chip = document.createElement("button");
  chip.className = "chip";
  chip.textContent = t.name;
  chip.addEventListener("click", () => {
    document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    $width.value = t.w;
    $height.value = t.h;
    if (!$prompt.value.trim()) {
      $prompt.focus();
    }
  });
  $templates.appendChild(chip);
});

// Settings toggle
document.getElementById("settingsToggle").addEventListener("click", () => {
  const panel = document.getElementById("settingsPanel");
  const arrow = document.getElementById("settingsArrow");
  panel.classList.toggle("open");
  arrow.classList.toggle("open");
});

// Strength slider
$strSlider.addEventListener("input", () => {
  $strVal.textContent = ($strSlider.value / 100).toFixed(2);
});

// Reference image handling
function setRefImage(file) {
  refFile = file;
  const url = URL.createObjectURL(file);
  $refThumb.src = url;
  $refName.textContent = file.name;
  $refPrev.classList.add("visible");
  $dropZone.style.display = "none";
}

function clearRefImage() {
  refFile = null;
  $refThumb.src = "";
  $refName.textContent = "";
  $refPrev.classList.remove("visible");
  $dropZone.style.display = "block";
  $refInput.value = "";
}

$refInput.addEventListener("change", (e) => {
  if (e.target.files[0]) setRefImage(e.target.files[0]);
});

$dropZone.addEventListener("dragover", (e) => { e.preventDefault(); $dropZone.classList.add("dragover"); });
$dropZone.addEventListener("dragleave", () => $dropZone.classList.remove("dragover"));
$dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  $dropZone.classList.remove("dragover");
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith("image/")) setRefImage(file);
});

$refRem.addEventListener("click", clearRefImage);

// Generate
async function generate(regen = false) {
  const prompt = $prompt.value.trim();
  if (!prompt) { $prompt.focus(); return; }

  const width  = parseInt($width.value) || 1024;
  const height = parseInt($height.value) || 1024;
  const steps  = parseInt($steps.value) || 30;
  const seedVal = regen ? null : ($seed.value ? parseInt($seed.value) : null);

  // Find active template hint
  const activeChip = document.querySelector(".chip.active");
  const template = activeChip ? TEMPLATES.find(t => t.name === activeChip.textContent) : null;
  let fullPrompt = prompt;
  if (template && !prompt.toLowerCase().includes(template.hint.split(",")[0].toLowerCase())) {
    fullPrompt = `${prompt}, ${template.hint}`;
  }

  // UI state
  $genBtn.disabled = true;
  $genBtn.classList.add("loading");
  $genText.textContent = "Generating...";
  $error.classList.remove("visible");

  try {
    const formData = new FormData();
    formData.append("prompt", fullPrompt);
    formData.append("width", width);
    formData.append("height", height);
    formData.append("steps", steps);
    formData.append("guidance", parseFloat($guidance.value) || 4.5);
    if (seedVal !== null) formData.append("seed", seedVal);

    if (refFile) {
      formData.append("image", refFile);
      formData.append("strength", ($strSlider.value / 100).toFixed(2));
    }

    const resp = await fetch(`${API_BASE}/generate`, { method: "POST", body: formData });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: resp.statusText }));
      throw new Error(err.detail || "Generation failed");
    }

    const blob = await resp.blob();
    currentBlob = blob;
    lastPrompt = fullPrompt;
    lastSeed = resp.headers.get("X-Seed");
    const genTime = resp.headers.get("X-Generation-Time");

    const url = URL.createObjectURL(blob);
    $img.src = url;
    $info.textContent = `${width}×${height} · Seed: ${lastSeed || "?"}`;
    $time.textContent = genTime ? `${parseFloat(genTime).toFixed(1)}s` : "";
    $result.classList.add("visible");

    // Save to history
    const reader = new FileReader();
    reader.onload = () => {
      history.unshift({
        data: reader.result,
        prompt: fullPrompt,
        width, height, seed: lastSeed,
        time: Date.now(),
      });
      if (history.length > 20) history = history.slice(0, 20);
      localStorage.setItem("cg_history", JSON.stringify(history));
      renderHistory();
    };
    reader.readAsDataURL(blob);

  } catch (e) {
    $error.textContent = e.message;
    $error.classList.add("visible");
  } finally {
    $genBtn.disabled = false;
    $genBtn.classList.remove("loading");
    $genText.textContent = "Generate";
  }
}

$genBtn.addEventListener("click", () => generate());

// Keyboard shortcut
$prompt.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
    e.preventDefault();
    generate();
  }
});

// Actions
document.getElementById("btnDownload").addEventListener("click", () => {
  if (!currentBlob) return;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(currentBlob);
  a.download = `generated_${lastSeed || Date.now()}.png`;
  a.click();
});

document.getElementById("btnRegen").addEventListener("click", () => generate(true));

document.getElementById("btnCopyPrompt").addEventListener("click", () => {
  navigator.clipboard.writeText(lastPrompt).then(() => showToast("Prompt copied!"));
});

// History
function renderHistory() {
  const $grid = document.getElementById("historyGrid");
  const $section = document.getElementById("historySection");
  $grid.innerHTML = "";
  if (history.length === 0) { $section.style.display = "none"; return; }
  $section.style.display = "block";
  history.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.innerHTML = `<img src="${item.data}" alt=""><div class="history-prompt">${escHtml(item.prompt.slice(0, 60))}</div>`;
    div.addEventListener("click", () => {
      $prompt.value = item.prompt;
      $width.value = item.width;
      $height.value = item.height;
      if (item.seed) $seed.value = item.seed;
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    $grid.appendChild(div);
  });
}

document.getElementById("btnClearHistory").addEventListener("click", () => {
  history = [];
  localStorage.removeItem("cg_history");
  renderHistory();
});

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

// Init
renderHistory();
</script>
</body>
</html>
